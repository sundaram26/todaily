services:
  db:
    image: postgres
    container_name: todaily_postgres
    restart: always
    shm_size: 128mb
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: password

  pgadmin:
      image: dpage/pgadmin4
      container_name: todaily_pgadmin
      restart: always
      ports:
        - "5050:80"
      environment:
        PGADMIN_DEFAULT_EMAIL: admin@todaily.com
        PGADMIN_DEFAULT_PASSWORD: admin123
